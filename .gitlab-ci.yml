# Ubah dari 8.2 ke 8.3
image: kirschbaumdevelopment/laravel-test-runner:8.3

stages:
  - build
  - test
  - deploy

cache:
  paths:
    - vendor/

build_job:
  stage: build
  script:
    # Kita tambahkan flag --ignore-platform-reqs untuk berjaga-jaga jika ada mismatch kecil
    - composer install --prefer-dist --no-ansi --no-interaction --no-progress --ignore-platform-reqs
    - cp .env.example .env
    - php artisan key:generate
  artifacts:
    expire_in: 1h
    paths:
      - vendor/
      - .env

test_job:
  stage: test
  dependencies:
    - build_job
  script:
    - php artisan test

deploy_production:
  stage: deploy
  dependencies:
    - build_job
  script:
    - echo "Deploying..."
    - php artisan migrate --force
  when: manual
  only:
    - main
